<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Myungcheol Lee</title>
    <meta name="description" content="Myungcheol Lee's academic homepage featuring research, publications, and contact information.">
    <link rel="stylesheet" href="{{ '/stylesheets/styles.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="brand-block">
          <img class="profile-photo" src="{{ '/assets/images/profile.jpg' | relative_url }}" alt="Portrait of Myungcheol Lee">
          <div>
            <p class="eyebrow">Academic Homepage</p>
            <h1 class="site-title">Myungcheol Lee</h1>
            <p class="site-subtitle">Principal Researcher at ETRI</p>
          </div>
        </div>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}" {% if page.title == 'Home' %}aria-current="page"{% endif %}>Home</a>
          <a href="{{ '/publications.html' | relative_url }}" {% if page.title == 'Publications' %}aria-current="page"{% endif %}>Publications</a>
          <a href="{{ '/projects.html' | relative_url }}" {% if page.title == 'Projects' %}aria-current="page"{% endif %}>Projects</a>
          <a href="{{ '/contact.html' | relative_url }}" {% if page.title == 'Contact' %}aria-current="page"{% endif %}>Contact</a>
        </nav>
      </header>

      <main class="content-card">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>Focused on distributed systems, blockchain storage, big data analytics, and AI systems.</p>
      </footer>
    </div>
  </body>
</html>
